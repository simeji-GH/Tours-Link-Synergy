<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>リンクシナジーチェッカー</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <style>
    html, body {
      margin: 0; padding: 0;
      min-width: 100vw;
      min-height: 100vh;
      width: 100vw;
      height: 100vh;
      background: #f7f7fa;
      font-family: sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100vw;
      height: 100vh;
      min-width: 100vw;
      min-height: 100vh;
    }
    .header {
      width: 100vw;
      background: #f7f7fa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4vw 0 2vw 0;
      box-sizing: border-box;
    }
    .titlebar {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      width: 94vw;
      max-width: 540px;
      margin: 0 auto;
      position: relative;
      box-sizing: border-box;
    }
    .title {
      font-size: 6vw;
      font-weight: bold;
      letter-spacing: .08em;
      color: #273755;
      text-align: center;
      flex: 1 1 auto;
      min-width: 0;
      margin: 0 auto 0 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .update-btn {
      width: 8vw;
      min-width: 30px;
      max-width: 42px;
      height: 8vw;
      min-height: 30px;
      max-height: 42px;
      padding: 0;
      margin-left: 2vw;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;align-items: center;justify-content: center;
      position: absolute;
      right: 0;
      top: 50%; transform: translateY(-50%);
    }
    .update-btn svg { width: 7vw; height: 7vw; min-width:26px; min-height:26px; max-width:36px; max-height:36px;}
    <!-- Switch row レイアウト -->
    .switch-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2vw;
      margin: 2vw 0 3vw 0;
      width: 100vw;
    }
    .switchlabel {
      font-size: 4vw;
      color: #2c72a2;
      white-space: nowrap;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 9vw;
      max-width: 48px;
      height: 4.5vw;
      max-height: 24px;
      min-width: 36px;
      vertical-align: middle;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0;
      right: 0; bottom: 0;
      background-color: #ccc;
      border-radius: 5vw;
      transition: .2s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 4vw; width: 4vw;
      max-width: 21px; max-height: 21px;
      left: 0.25vw; bottom: 0.25vw;
      background-color: white;
      border-radius: 50%;
      transition: .2s;
    }
    input:checked + .slider {
      background-color: #44b4f7;
    }
    input:checked + .slider:before {
      transform: translateX(4vw);
    }
    .mainwrapper{
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      width: 100vw;
      display: flex; flex-direction: column;
    }
    .gridarea-holder{
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      width: 100vw;
      display: flex; flex-direction: column; align-items: stretch;
      background: #f7f7fa;
    }
    .grid-scroll-wrap{
      flex: 1 1 auto;
      overflow-y: auto;
      min-width:0; min-height:0;
      padding: 3vw 0 2vw 0;
      width: 100vw;
      display: flex; flex-direction: column; align-items: center;
      box-sizing: border-box;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3vw;
      width: 94vw;
      margin: 0;
      min-width: 0;
      max-width: 100vw;
      justify-items: center;
      align-items: center;
      box-sizing: border-box;
      padding-left: 0; padding-right: 0;
    }
    @media (min-width: 600px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
    .imgbox {
      background: #fff;
      border: 2px solid #aaa;
      border-radius: 12px;
      font-size: 4vw;
      font-weight: 500;
      min-height: 13vw;
      min-width: 35vw;
      max-width: 45vw;
      width: 95%;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      margin: 0;
      padding: 2vw 0;
      transition: 0.17s;
      box-shadow: 0 0.5vw 1vw #bbb1;
      cursor: pointer;
      position: relative;
      text-align: center;
      z-index:1;
      box-sizing: border-box;
    }
    .imgbox.selected { background: #a7e2fa; border-color: #2c72a2 !important; color: #222;}
    .imgbox.sugg2 { background: #ffef9a; border-color: #d4ae36 !important; color: #643a00;}
    .imgbox.sugg3 { background: #ffb0af; border-color: #cd4440 !important; color: #760000;}
    <-- 結果領域・必ず3行可視/高さ固定 -->
    .result-holder{
      width: 100vw;
      background: #fff;
      border-top: 1px solid #ddd;
      box-shadow: 0 -3px 12px #9992;
      padding-top: 2vw; padding-bottom: 2vw; 
      padding-left: 5vw; padding-right: 5vw;
      position: relative;
      flex-shrink: 0;
      z-index:3;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 26vw; <!-- 8vw×3+2vw余白分 スマホ100%で3行見える設計 -->
      min-height: 26vw;
      max-height: 30vw;
      box-sizing: border-box;
    }
    .result-list{
      font-size: 5vw;
      margin: 0;
      padding: 0 0 0 1.6em;
      color: #222;
      width: 100vw;
      max-width: 540px;
      list-style-type: disc;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      height: 100%;
      min-height: 100%;
    }
    .result-list li {
      min-height: 8vw;
      height: 8vw;
      margin-top: 0;
      margin-bottom: 0;
      line-height: 1.2;
      word-break: break-all;
      display: flex;
      align-items: center;
      font-size: 5vw;
      width: 100%;
      max-width: 520px;
    }
    @media (min-width:600px){
      .result-holder {height:60px;max-height:72px;padding-top:8px;padding-bottom:8px;}
      .result-list {font-size:19px;}
      .result-list li {font-size:19px;min-height:20px;height:24px;}
    }
    /* 更新時の中央モーダル */
    .updatemsg {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      background: #fff;
      color: #222;
      box-shadow: 0 6px 24px #0004;
      border-radius:16px;
      z-index: 4000;
      min-width: 60vw;
      padding: 6vw 4vw;
      font-size:5.2vw;
      font-weight:bold;
      text-align: center;
      line-height: 1.3;
      border:2px solid #3bb2df;
      pointer-events: none;
      opacity: 0.96;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="titlebar">
      <span class="title">リンクシナジーチェッカー</span>
      <button class="update-btn" id="updateBtn" title="更新">
        <!-- 時計回り回転 SVGアイコン -->
        <svg viewBox="0 0 22 22" fill="none">
          <path d="M11 2a9 9 0 0 1 9 9h-1.8a7.2 7.2 0 1 0 1.2 4.05" stroke="#337ab7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 2v7h-7" stroke="#338ddb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="switch-row">
      <span class="switchlabel">3組発動の候補表示</span>
      <label class="switch">
        <input type="checkbox" id="show3Switch" />
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <div class="mainwrapper">
    <div class="gridarea-holder">
      <div class="grid-scroll-wrap">
        <div id="grid" class="grid"></div>
      </div>
    </div>
    <div class="result-holder">
      <ul class="result-list" id="result"></ul>
    </div>
  </div>
  <div id="updateMsg" class="updatemsg" style="display:none;">
    <div>組合せデータを<br>更新しました</div>
  </div>
<script>
const nameList = [
  "天海春香","如月千早","星井美希","水瀬伊織",
  "島村卯月","渋谷凛","本田未央","神崎蘭子",
  "春日未来","最上静香","伊吹翼","真壁瑞希",
  "天道輝","桜庭薫","柏木翼","硲道夫",
  "櫻木真乃","風野灯織","八宮めぐる","小宮果穂",
  "花海咲季","月村手毬","藤田ことね","紫雲清夏"
];
const CSV_URL = 'idol_data.csv';

let csvRaw = [];
let selected = [];
const grid = document.getElementById('grid');
const boxes = [];
let isCsvReady = false;
let show3Switch = false; // 新トグル
const show3SwitchEl = document.getElementById('show3Switch');
show3SwitchEl.checked = false;

show3SwitchEl.onchange = function(){
  show3Switch = show3SwitchEl.checked;
  refreshSuggestions();
}

// ★常時ON 1人選択時の候補強調と、show3Switch==ON時のノー選択強調
let highlightSingle = true;

function renderGrid() {
  grid.innerHTML = '';
  for (let i=0; i<24; i++) {
    const d = document.createElement('div');
    d.className = 'imgbox';
    d.textContent = nameList[i];
    d.onclick = () => selectImage(i, d);
    grid.appendChild(d);
    boxes[i] = d;
  }
}
async function fetchCsv(url, retries=2) {
  try {
    const res = await fetch(url);
    if (!(res.ok)) throw new Error('CSV取得失敗 ' + url);
    const text = await res.text();
    csvRaw = text.trim().split('\n').map(row => row.trim().split(','));
    isCsvReady = true;
    refreshSuggestions();
  } catch (e) {
    if (retries>0) setTimeout(()=>fetchCsv(url,retries-1), 1000);
    else alert('CSVの読込に失敗しました');
  }
}
function selectImage(idx, elem) {
  if (!isCsvReady) return;
  if (selected.includes(idx)) {
    selected = selected.filter(n=>n!==idx);
    elem.classList.remove('selected');
    showResult(null);
    refreshSuggestions();
    return;
  }
  if (selected.length>=3) return;
  selected.push(idx);
  elem.classList.add('selected');
  if (selected.length===3) {
    showResult(findResult());
    clearSuggestions();
  } else {
    refreshSuggestions();
  }
}
function clearSelections() {
  selected = [];
  boxes.forEach(d=>d.className='imgbox');
  showResult(null);
  refreshSuggestions();
}
function clearSuggestions() {
  boxes.forEach(b => {
    b.classList.remove('sugg2');
    b.classList.remove('sugg3');
  });
}

// 候補強調ロジック
function refreshSuggestions() {
  clearSuggestions();
  if (!csvRaw.length) return;

  // 3組発動候補表示スイッチON時かつ未選択時に「返しデータ3つの候補を赤色強調」
  if (show3Switch && selected.length === 0) {
    const cands3 = [];
    for (let row of csvRaw) {
      const group = row.slice(0,3);
      const resCount = row.slice(3).filter(x=>x!=="").length;
      // 3つ返すデータで未選択
      if (resCount === 3) {
        group.forEach(nm=>{
          const idx = nameList.indexOf(nm);
          if(idx!==-1 && !cands3.includes(idx)) cands3.push(idx);
        });
      }
    }
    cands3.forEach(idx => boxes[idx].classList.add('sugg3'));
    return; // 他の強調表示しない
  }

  // 1人・2人常に候補強調
  if ((highlightSingle && selected.length === 1) || selected.length === 2) {
    const selN = selected.map(idx => nameList[idx]);
    let cands2=[], cands3=[];
    for (let row of csvRaw) {
      let group = row.slice(0,3);
      let match = selN.every(n => group.includes(n));
      if (match) {
        const restNames = group.filter(n => !selN.includes(n));
        const resCount = row.slice(3).filter(x=>x!=="").length;
        if (restNames.length !== (3-selN.length)) continue;
        if (resCount === 2) restNames.forEach(nm=>{ if (!cands2.includes(nm)) cands2.push(nm)});
        if (resCount === 3) restNames.forEach(nm=>{ if (!cands3.includes(nm)) cands3.push(nm)});
      }
    }
    cands3.forEach(name=>{
      const idx = nameList.indexOf(name);
      if (idx!==-1 && !selected.includes(idx)) boxes[idx].classList.add('sugg3');
    });
    cands2.forEach(name=>{
      const idx = nameList.indexOf(name);
      if (idx!==-1 && !selected.includes(idx) && !boxes[idx].classList.contains('sugg3')) boxes[idx].classList.add('sugg2');
    });
  }
}
function findResult() {
  let selNames = selected.map(idx=>nameList[idx]).sort();
  for (let row of csvRaw) {
    let group = row.slice(0,3).slice().sort();
    if (JSON.stringify(selNames) === JSON.stringify(group)) {
      return row.slice(3).filter(x=>x!=="");
    }
  }
  return ["該当なし"];
}
function showResult(arr) {
  const el = document.getElementById('result');
  let list = Array.isArray(arr) ? arr : [];
  // 必ず3行分見えるよう空白liで補完
  while(list.length < 3) list.push('');
  el.innerHTML = list.map(x=>x?`<li>${x}</li>`:`<li style="opacity:.01;">-</li>`).join('');
}
function showUpdateMsg(){
  const box = document.getElementById('updateMsg');
  box.style.display = "block";
  setTimeout(()=>{box.style.display="none"}, 3000);
}
// 更新ボタンの動作
document.getElementById('updateBtn').onclick = function(){
  // ページの再読込風アクション
  clearSelections();
  show3Switch = false; show3SwitchEl.checked = false;
  fetchCsv(CSV_URL); // 再読込
  showUpdateMsg();
  window.scrollTo(0,0);
  // グリッド他UIも初期状態に復帰
}

// 初期化
renderGrid();
fetchCsv(CSV_URL);
</script>
</body>
</html>
